<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sosui Koga: Arts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="scripts/common.js"></script>
  <link rel="stylesheet" href="css/products.css">
  <link rel="stylesheet" href="css/arts.css">
</head>
<body>
  <header id="site-header"></header>
  <section id="profile-hero"></section>

  <main class="arts-container">

    <section class="works-section">
      <h2 data-ja="作品" data-en="Works">作品</h2>
      <div class="arts-work-grid" id="arts-work-grid"></div>
    </section>

    <div class="arts-grid">
      <a class="art-card" href="https://www.instagram.com/so_sweet_jp/" target="_blank" rel="noopener noreferrer">
        <span class="art-card-icon" aria-hidden="true">🎨</span>
        <span class="art-card-body">
          <strong data-ja="ジェネレーティブアート" data-en="Generative Art">ジェネレーティブアート</strong>
          <span>@so_sweet_jp</span>
        </span>
        <span class="art-card-arrow" aria-hidden="true">↗</span>
      </a>

      <a class="art-card" href="https://www.instagram.com/sweets.photon/" target="_blank" rel="noopener noreferrer">
        <span class="art-card-icon" aria-hidden="true">📸</span>
        <span class="art-card-body">
          <strong data-ja="写真" data-en="Photography">写真</strong>
          <span>@sweets.photon</span>
        </span>
        <span class="art-card-arrow" aria-hidden="true">↗</span>
      </a>
    </div>

    <section class="favorites-section" id="favorites">
      <h2 data-ja="個人的に好きな方々" data-en="Favorite Creators">個人的に好きな方々</h2>
      <div class="favorites-grid" id="favorites-grid"></div>
    </section>
  </main>

  <div class="art-modal" id="art-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="art-modal-title">
    <div class="art-modal-content">
      <button class="art-modal-close" id="art-modal-close" type="button" aria-label="閉じる">×</button>
      <button class="art-modal-nav art-modal-prev" id="art-modal-prev" type="button" aria-label="前の作品">‹</button>
      <img id="art-modal-image" src="" alt="">
      <button class="art-modal-nav art-modal-next" id="art-modal-next" type="button" aria-label="次の作品">›</button>
      <h2 id="art-modal-title"></h2>
      <p id="art-modal-description"></p>
    </div>
  </div>

  <footer>© 2026 Sosui Koga</footer>
  <script>
    window.SiteCommon.init('arts');
    let artRows = [];
    let currentArtIndex = 0;
    const artModal = document.getElementById('art-modal');
    const artModalImage = document.getElementById('art-modal-image');
    const artModalTitle = document.getElementById('art-modal-title');
    const artModalDescription = document.getElementById('art-modal-description');

    function showArt(index) {
      if (artRows.length === 0) return;
      currentArtIndex = (index + artRows.length) % artRows.length;
      const item = artRows[currentArtIndex];
      const isEnglish = window.SiteCommon.getCurrentLang() === 'en';
      artModalImage.src = item.image;
      artModalImage.alt = isEnglish ? (item.title_en || item.title) : item.title;
      artModalTitle.textContent = artModalImage.alt;
      artModalDescription.textContent = isEnglish
        ? (item.description_en || item.description || '')
        : (item.description || '');
    }

    function openArtModal(index) {
      showArt(index);
      artModal.classList.add('is-open');
      artModal.setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
    }

    function closeArtModal() {
      artModal.classList.remove('is-open');
      artModal.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    function renderArts() {
      const grid = document.getElementById('arts-work-grid');
      grid.innerHTML = '';

      artRows.forEach((item, index) => {
        const work = document.createElement('article');
        work.className = 'arts-work-card';
        work.tabIndex = 0;
        work.setAttribute('role', 'button');
        work.setAttribute('aria-label', `${item.title}を拡大表示`);
        work.addEventListener('click', () => openArtModal(index));
        work.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openArtModal(index);
          }
        });

        const image = document.createElement('img');
        image.src = item.image;
        image.alt = window.SiteCommon.getCurrentLang() === 'en' ? (item.title_en || item.title) : item.title;
        image.loading = 'lazy';
        work.appendChild(image);

        const title = document.createElement('h3');
        title.textContent = window.SiteCommon.getCurrentLang() === 'en' ? (item.title_en || item.title) : item.title;
        work.appendChild(title);

        const description = window.SiteCommon.getCurrentLang() === 'en'
          ? (item.description_en || item.description)
          : item.description;
        if (description) {
          const text = document.createElement('p');
          text.textContent = description;
          work.appendChild(text);
        }
        grid.appendChild(work);
      });
    }

    fetch('arts_data.json')
      .then((response) => {
        if (!response.ok) throw new Error(`Failed to load arts_data.json: ${response.status}`);
        return response.json();
      })
      .then((data) => {
        artRows = (data || []).filter((item) => item && item.title && item.image);
        artRows.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        renderArts();
      })
      .catch((error) => console.error(error));

    window.SiteCommon.onLanguageChange(renderArts);

    document.getElementById('art-modal-close').addEventListener('click', closeArtModal);
    document.getElementById('art-modal-prev').addEventListener('click', () => showArt(currentArtIndex - 1));
    document.getElementById('art-modal-next').addEventListener('click', () => showArt(currentArtIndex + 1));
    artModal.addEventListener('click', (event) => {
      if (event.target === artModal) closeArtModal();
    });
    document.addEventListener('keydown', (event) => {
      if (!artModal.classList.contains('is-open')) return;
      if (event.key === 'Escape') closeArtModal();
      if (event.key === 'ArrowLeft') showArt(currentArtIndex - 1);
      if (event.key === 'ArrowRight') showArt(currentArtIndex + 1);
    });

    const favorites = [
      { url: 'https://si-ku.art/', title: 'si-ku.art', description: 'Creative design & art' },
      { url: 'http://ngethoma.com/', title: 'ngethoma', description: 'Digital creativity' },
      { url: 'https://baku89.com/ja/', title: 'baku89', description: 'Creative coding & design' },
      { url: 'https://ideoaves.github.io/', title: 'ideoaves', description: 'Interactive art & tech' }
    ];

    const favoritesGrid = document.getElementById('favorites-grid');
    favorites.forEach((favorite) => {
      const card = document.createElement('a');
      card.href = favorite.url;
      card.className = 'favorite-card';
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      const icon = document.createElement('img');
      icon.className = 'favorite-icon';
      icon.src = `https://www.google.com/s2/favicons?sz=64&domain=${new URL(favorite.url).hostname}`;
      icon.alt = favorite.title;
      card.appendChild(icon);

      const title = document.createElement('span');
      title.className = 'favorite-title';
      title.textContent = favorite.title;
      card.appendChild(title);

      const description = document.createElement('span');
      description.className = 'favorite-description';
      description.textContent = favorite.description;
      card.appendChild(description);

      favoritesGrid.appendChild(card);
    });
  </script>
</body>
</html>
