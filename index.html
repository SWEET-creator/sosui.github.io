<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>古賀 荘翠 / Sosui Koga</title>
    <script>
        if (!window.location.hash && !window.location.search) {
            window.location.replace('products.html');
        }
    </script>
    <script src="scripts/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header id="site-header"></header>

    <main class="container">
        <section id="profile-hero"></section>

        <section class="content-block" id="bio">
            <h2 data-ja="研究内容" data-en="Research">研究内容</h2>
            <p data-ja="コンピュータビジョンを用いたアニメーション制作支援技術の研究開発" data-en="Research and development of animation production support using computer vision.">コンピュータビジョンを用いたアニメーション制作支援技術の研究開発</p>

            <h2 id="links" data-ja="Links" data-en="Links">Links</h2>
            <p><span data-ja="Products:" data-en="Products:">Products:</span> <a href="products.html" data-ja="Products page" data-en="Products page">Products page</a></p>
            <p><span data-ja="Google Scholar:" data-en="Google Scholar:">Google Scholar:</span> <a href="https://scholar.google.com/citations?view_op=list_works&hl=ja&hl=ja&user=VOoQZkEAAAAJ">古賀荘翠</a></p>
            <p><span data-ja="X:" data-en="X:">X:</span> <a href="https://x.com/sosui0131">古賀 荘翠</a></p>
            <p>GitHub: <a href="https://github.com/SWEET-creator">SWEET-creator</a></p>
            <p>Instagram (Photo): <a href="https://www.instagram.com/sweets.photon/">@sweets.photon</a></p>
            <p>Instagram (Generative Art): <a href="https://www.instagram.com/so_sweet_jp/">@so_sweet_jp</a></p>

            <h2 data-ja="Contact" data-en="Contact">Contact</h2>
            <p><a href="mailto:sosui.koga.ko9@naist.ac.jp">sosui.koga.ko9@naist.ac.jp</a></p>
        </section>

        <section class="content-block" id="achievements">
            <h2 data-ja="Achievements" data-en="Achievements">Achievements</h2>
            <div id="achievements-list" class="achievements-list"></div>
        </section>
    </main>

    <script>
        window.SiteCommon.init('index');
        let achievementRows = [];

        const TYPE_LABELS_EN = {
            '学歴': 'Education',
            '研究業績': 'Research',
            'フェローシップ・研究費': 'Fellowships & Grants',
            'プロジェクト': 'Projects',
            '競技・ハッカソン': 'Competitions & Hackathons',
            '職歴': 'Work Experience',
            '受賞歴': 'Awards',
            'スキル': 'Skills',
            'その他': 'Others'
        };

        const CATEGORY_LABELS_EN = {
            '査読付き論文（論文誌）': 'Peer-reviewed Journal Papers',
            '査読付き国際会議（筆頭著者）': 'Peer-reviewed International Conferences (First Author)',
            '国内会議（筆頭著者）': 'Domestic Conferences (First Author)',
            '査読付き国際会議（共著）': 'Peer-reviewed International Conferences (Co-author)',
            '国内会議（共著）': 'Domestic Conferences (Co-author)',
            'プログラミング': 'Programming',
            'Web': 'Web',
            'AI / 機械学習': 'AI / Machine Learning',
            'ツール': 'Tools',
            '資格': 'Certification'
        };

        const TYPE_ORDER = [
            '学歴',
            '研究業績',
            'フェローシップ・研究費',
            'プロジェクト',
            '競技・ハッカソン',
            '職歴',
            '受賞歴',
            'スキル',
            'その他'
        ];

        function trType(value) {
            if (window.SiteCommon.getCurrentLang() === 'en') return TYPE_LABELS_EN[value] || value;
            return value;
        }

        function trCategory(value) {
            if (window.SiteCommon.getCurrentLang() === 'en') return CATEGORY_LABELS_EN[value] || value;
            return value;
        }

        function renderAchievements(rows) {
            const container = document.getElementById('achievements-list');
            container.innerHTML = '';

            const grouped = {};
            rows.forEach((row) => {
                const type = (row.type || 'その他').trim();
                const category = (row.category || '').trim();
                if (!grouped[type]) grouped[type] = {};
                if (!grouped[type][category]) grouped[type][category] = [];
                grouped[type][category].push(row);
            });

            const orderedTypes = [
                ...TYPE_ORDER.filter((t) => grouped[t]),
                ...Object.keys(grouped).filter((t) => !TYPE_ORDER.includes(t))
            ];

            orderedTypes.forEach((type) => {
                const typeSection = document.createElement('section');
                typeSection.className = 'achievement-group';

                const typeTitle = document.createElement('h3');
                typeTitle.className = 'achievement-group-title';
                typeTitle.textContent = trType(type);
                typeSection.appendChild(typeTitle);

                const categories = Object.keys(grouped[type]);
                categories.forEach((category) => {
                    const categoryRows = grouped[type][category];
                    categoryRows.sort((a, b) => Number(b.year || 0) - Number(a.year || 0));

                    if (category) {
                        const subTitle = document.createElement('h4');
                        subTitle.className = 'achievement-subgroup-title';
                        subTitle.textContent = trCategory(category);
                        typeSection.appendChild(subTitle);
                    }

                    categoryRows.forEach((item) => {
                        const entry = document.createElement('article');
                        entry.className = 'achievement-item';

                        const title = document.createElement('p');
                        title.className = 'achievement-title';
                        title.textContent = window.SiteCommon.getCurrentLang() === 'en'
                            ? ((item.title_en && item.title_en.trim()) ? item.title_en : item.title)
                            : item.title;

                        if (item.year && item.year.trim() !== '') {
                            const year = document.createElement('span');
                            year.className = 'achievement-year';
                            year.textContent = item.year;
                            title.prepend(year);
                        }

                        entry.appendChild(title);

                        if (item.Link && item.Link.trim() !== '') {
                            const link = document.createElement('a');
                            link.href = item.Link;
                            link.target = '_blank';
                            link.rel = 'noopener noreferrer';
                            link.textContent = window.SiteCommon.getCurrentLang() === 'en' ? 'Details' : '詳細';
                            entry.appendChild(link);
                        }

                        typeSection.appendChild(entry);
                    });
                });

                container.appendChild(typeSection);
            });
        }

        Papa.parse('achievements_data.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                achievementRows = (results.data || []).filter((r) => r && r.title);
                renderAchievements(achievementRows);
            }
        });

        window.SiteCommon.onLanguageChange(() => {
            renderAchievements(achievementRows);
        });
    </script>

</body>
</html>
