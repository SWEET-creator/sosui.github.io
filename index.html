<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>古賀 荘翠 / Sosui Koga</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="scripts/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="css/index.css?v=20260711-achievement-single-link">
</head>

<body>
    <header id="site-header"></header>

    <main class="container">
        <section id="profile-hero"></section>

        <section class="content-block" id="bio">
            <h2 data-ja="Research" data-en="Research">Research</h2>
            <p data-ja="コンピュータビジョンとコンピュータグラフィックスを横断し、アニメーションを中心とした映像制作の支援・自動化・表現拡張に取り組んでいます。" data-en="Research and development of animation production support using computer vision.">コンピュータビジョンを用いたアニメーション制作支援技術の研究開発</p>
            <div id="research-achievements-list" class="achievements-list"></div>
        </section>

        <section class="content-block" id="achievements">
            <h2 data-ja="Achievements" data-en="Achievements">Achievements</h2>
            <div id="achievements-list" class="achievements-list"></div>
        </section>

        <section class="content-block" id="featured-products">
            <div class="section-header">
                <h2 data-ja="Latest Products" data-en="Latest Products">Latest Products</h2>
                <a href="products.html" class="view-more-btn" data-ja="もっと見る" data-en="View all">もっと見る</a>
            </div>
            <div id="featured-products-container" class="featured-products-grid"></div>
        </section>

        <section class="content-block" id="latest-arts">
            <div class="section-header">
                <h2 data-ja="Latest Arts" data-en="Latest Arts">Latest Arts</h2>
                <a href="Arts.html" class="view-more-btn" data-ja="もっと見る" data-en="View all">もっと見る</a>
            </div>
            <div id="latest-arts-container" class="featured-products-grid"></div>
        </section>

        <section class="content-block" id="links">
            <h2 data-ja="Links" data-en="Links">Links</h2>
            <div class="social-links">
                <a href="https://scholar.google.com/citations?view_op=list_works&hl=ja&hl=ja&user=VOoQZkEAAAAJ" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">🎓</span><span class="link-text">Google Scholar</span></a>
                <a href="https://jglobal.jst.go.jp/detail?JGLOBAL_ID=202601016785382971" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">🔬</span><span class="link-text">J-GLOBAL</span></a>
                <a href="https://researchmap.jp/sosui" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">🗺️</span><span class="link-text">researchmap</span></a>
                <a href="https://x.com/sosui0131" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">𝕏</span><span class="link-text">X</span></a>
                <a href="https://github.com/SWEET-creator" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">🐙</span><span class="link-text">GitHub</span></a>
                <a href="https://www.instagram.com/sweets.photon/" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">📸</span><span class="link-text">Photo</span></a>
                <a href="https://www.instagram.com/so_sweet_jp/" class="social-link" target="_blank" rel="noopener noreferrer"><span class="link-icon">🎨</span><span class="link-text">Art</span></a>
            </div>

            <h2 data-ja="Contact" data-en="Contact">Contact</h2>
            <p><a href="mailto:sosui.koga.ko9@naist.ac.jp">sosui.koga.ko9@naist.ac.jp</a></p>
        </section>

    </main>

    <script>
        window.SiteCommon.init('index');
        let achievementRows = [];
        let artRows = [];

        const TYPE_LABELS_EN = {
            '学歴': 'Education',
            '研究業績': 'Research',
            'フェローシップ・研究費': 'Fellowships & Grants',
            'プロジェクト': 'Projects',
            '競技・ハッカソン': 'Competitions & Hackathons',
            '職歴': 'Work Experience',
            '受賞歴': 'Awards',
            'スキル': 'Skills',
            'その他': 'Others'
        };

        const CATEGORY_LABELS_EN = {
            '査読付き論文（論文誌）': 'Peer-reviewed Journal Papers',
            '査読付き国際会議（筆頭著者）': 'Peer-reviewed International Conferences (First Author)',
            '国内会議（筆頭著者）': 'Domestic Conferences (First Author)',
            '査読付き国際会議（共著）': 'Peer-reviewed International Conferences (Co-author)',
            '国内会議（共著）': 'Domestic Conferences (Co-author)',
            'プログラミング': 'Programming',
            'Web': 'Web',
            'AI / 機械学習': 'AI / Machine Learning',
            'ツール': 'Tools',
            '資格': 'Certification'
        };

        const TYPE_ORDER = [
            '学歴',
            '研究業績',
            'フェローシップ・研究費',
            'プロジェクト',
            '競技・ハッカソン',
            '職歴',
            '受賞歴',
            'スキル',
            'その他'
        ];

        function trType(value) {
            if (window.SiteCommon.getCurrentLang() === 'en') return TYPE_LABELS_EN[value] || value;
            return value;
        }

        function trCategory(value) {
            if (window.SiteCommon.getCurrentLang() === 'en') return CATEGORY_LABELS_EN[value] || value;
            return value;
        }

        function getAchievementLinks(item) {
            if (Array.isArray(item.Links)) {
                return item.Links
                    .map((link) => {
                        if (typeof link === 'string') {
                            return { url: link, label: '', label_en: '' };
                        }
                        return link || {};
                    })
                    .filter((link) => link.url && link.url.trim() !== '');
            }

            if (item.Link && item.Link.trim() !== '') {
                return [{ url: item.Link, label: '詳細', label_en: 'Details' }];
            }

            return [];
        }

        function renderAchievementGroups(rows, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const grouped = {};
            rows.forEach((row) => {
                const type = (row.type || 'その他').trim();
                const category = (row.category || '').trim();
                if (!grouped[type]) grouped[type] = {};
                if (!grouped[type][category]) grouped[type][category] = [];
                grouped[type][category].push(row);
            });

            const orderedTypes = [
                ...TYPE_ORDER.filter((t) => grouped[t]),
                ...Object.keys(grouped).filter((t) => !TYPE_ORDER.includes(t))
            ];

            orderedTypes.forEach((type) => {
                const typeSection = document.createElement('section');
                typeSection.className = 'achievement-group';

                const typeTitle = document.createElement('h3');
                typeTitle.className = 'achievement-group-title';
                typeTitle.textContent = trType(type);
                typeSection.appendChild(typeTitle);

                const categories = Object.keys(grouped[type]);
                categories.forEach((category) => {
                    const categoryRows = grouped[type][category];
                    categoryRows.sort((a, b) => Number(b.year || 0) - Number(a.year || 0));

                    if (category) {
                        const subTitle = document.createElement('h4');
                        subTitle.className = 'achievement-subgroup-title';
                        subTitle.textContent = trCategory(category);
                        typeSection.appendChild(subTitle);
                    }

                    categoryRows.forEach((item) => {
                        const entry = document.createElement('article');
                        entry.className = 'achievement-item';

                        const title = document.createElement('p');
                        title.className = 'achievement-title';
                        title.textContent = window.SiteCommon.getCurrentLang() === 'en'
                            ? ((item.title_en && item.title_en.trim()) ? item.title_en : item.title)
                            : item.title;

                        if (item.year && item.year.trim() !== '') {
                            const year = document.createElement('span');
                            year.className = 'achievement-year';
                            year.textContent = item.year;
                            title.prepend(year);
                        }

                        const links = getAchievementLinks(item);
                        if (links.length === 1) {
                            const titleLink = document.createElement('a');
                            titleLink.className = 'achievement-title-link';
                            titleLink.href = links[0].url;
                            titleLink.target = '_blank';
                            titleLink.rel = 'noopener noreferrer';
                            while (title.firstChild) titleLink.appendChild(title.firstChild);
                            title.appendChild(titleLink);
                        }

                        entry.appendChild(title);

                        if (links.length > 1) {
                            const linkList = document.createElement('div');
                            linkList.className = 'achievement-links';
                            linkList.classList.add('achievement-links--multiple');

                            links.forEach((linkItem) => {
                                const link = document.createElement('a');
                                link.href = linkItem.url;
                                link.target = '_blank';
                                link.rel = 'noopener noreferrer';
                                const linkLabel = window.SiteCommon.getCurrentLang() === 'en'
                                    ? ((linkItem.label_en && linkItem.label_en.trim()) ? linkItem.label_en : (linkItem.label || 'Details'))
                                    : ((linkItem.label && linkItem.label.trim()) ? linkItem.label : (linkItem.label_en || '詳細'));

                                const label = document.createElement('span');
                                label.textContent = linkLabel;
                                link.appendChild(label);
                                linkList.appendChild(link);
                            });

                            entry.appendChild(linkList);
                        }

                        typeSection.appendChild(entry);
                    });
                });

                container.appendChild(typeSection);
            });
        }

        function renderAchievements(rows) {
            const researchRows = rows.filter((row) => (row.type || '').trim() === '研究業績');
            const otherRows = rows.filter((row) => (row.type || '').trim() !== '研究業績');

            renderAchievementGroups(researchRows, 'research-achievements-list');
            renderAchievementGroups(otherRows, 'achievements-list');
        }

        fetch('achievements_data.json')
            .then((response) => {
                if (!response.ok) {
                    throw new Error(`Failed to load achievements_data.json: ${response.status}`);
                }
                return response.json();
            })
            .then((data) => {
                achievementRows = (data || []).filter((r) => r && r.title);
                renderAchievements(achievementRows);
            })
            .catch((error) => {
                console.error(error);
            });

        window.SiteCommon.onLanguageChange(() => {
            renderAchievements(achievementRows);
            renderLatestArts(artRows);
        });

        function renderLatestArts(rows) {
            const container = document.getElementById('latest-arts-container');
            container.innerHTML = '';

            rows.slice(0, 3).forEach((item) => {
                const card = document.createElement('article');
                card.className = 'featured-product-card';

                if (item.image) {
                    const image = document.createElement('img');
                    image.src = item.image;
                    image.alt = item.title || 'Art';
                    image.loading = 'lazy';
                    card.appendChild(image);
                }

                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = window.SiteCommon.getCurrentLang() === 'en'
                    ? (item.title_en || item.title)
                    : item.title;
                card.appendChild(title);

                const text = document.createElement('div');
                text.className = 'card-text';
                text.textContent = window.SiteCommon.getCurrentLang() === 'en'
                    ? (item.description_en || item.description || '')
                    : (item.description || '');
                card.appendChild(text);

                container.appendChild(card);
            });
        }

        fetch('arts_data.json')
            .then((response) => {
                if (!response.ok) throw new Error(`Failed to load arts_data.json: ${response.status}`);
                return response.json();
            })
            .then((data) => {
                artRows = (data || []).filter((item) => item && item.title);
                artRows.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
                renderLatestArts(artRows);
            })
            .catch((error) => console.error(error));

        // Load and display featured products
        Papa.parse('products_data.csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function (results) {
                const data = (results.data || []).filter((item) => item && (item.title || item.year));
                data.sort((a, b) => {
                    const ay = Number.parseInt((a.year || '').trim(), 10);
                    const by = Number.parseInt((b.year || '').trim(), 10);
                    const av = Number.isNaN(ay) ? -Infinity : ay;
                    const bv = Number.isNaN(by) ? -Infinity : by;
                    return bv - av;
                });

                const featuredContainer = document.getElementById('featured-products-container');
                const featuredCount = 3;
                const featuredItems = data.slice(0, featuredCount);

                featuredItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'featured-product-card';

                    if (item.year && item.year.trim() !== '') {
                        const year = document.createElement('div');
                        year.className = 'card-year';
                        year.textContent = item.year;
                        card.appendChild(year);
                    }

                    if (item.imgPath && item.imgPath.trim() !== '') {
                        const img = document.createElement('img');
                        img.src = item.imgPath;
                        img.alt = item.title || 'Product';
                        img.loading = 'lazy';
                        card.appendChild(img);
                    }

                    if (item.title && item.title.trim() !== '') {
                        const title = document.createElement('div');
                        title.className = 'card-title';
                        title.textContent = item.title;
                        card.appendChild(title);
                    }

                    if (item.text && item.text.trim() !== '') {
                        const text = document.createElement('div');
                        text.className = 'card-text';
                        text.textContent = item.text;
                        card.appendChild(text);
                    }

                    const footer = document.createElement('div');
                    footer.className = 'card-footer';

                    if (item.githubLink && item.githubLink.trim() !== '') {
                        const ghLink = document.createElement('a');
                        ghLink.href = item.githubLink;
                        ghLink.target = '_blank';
                        ghLink.textContent = 'GitHub';
                        footer.appendChild(ghLink);
                    }

                    if (item.projectLink && item.projectLink.trim() !== '') {
                        const projectLink = document.createElement('a');
                        projectLink.href = item.projectLink;
                        projectLink.target = '_blank';
                        projectLink.textContent = window.SiteCommon.getCurrentLang() === 'en' ? 'Project' : 'プロジェクト';
                        if (footer.children.length > 0) {
                            footer.appendChild(document.createTextNode(' '));
                        }
                        footer.appendChild(projectLink);
                    }

                    card.appendChild(footer);
                    featuredContainer.appendChild(card);
                });
            }
        });

    </script>

</body>
</html>
