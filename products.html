<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosui koga: Products</title>
  <!-- Google Fonts の読み込み: 例として Roboto を使用 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- Papa Parse をCDNで読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="css/products.css">
  
</head>
<body>
  <header>
    <div class="header-right-tools">
      <button id="lang-toggle" class="lang-toggle" type="button">EN</button>
      <div class="header-quick-links" aria-label="主要ページへの移動">
        <a class="header-quick-link" href="index.html#bio">
          <strong data-ja="Bio" data-en="Bio">Bio</strong>
        </a>
        <a class="header-quick-link" href="products.html">
          <strong data-ja="Products" data-en="Products">Products</strong>
        </a>
        <a class="header-quick-link" href="index.html#links">
          <strong data-ja="Links" data-en="Links">Links</strong>
        </a>
        <a class="header-quick-link" href="index.html#achievements">
          <strong data-ja="Achievements" data-en="Achievements">Achievements</strong>
        </a>
      </div>
    </div>
    <h1 data-ja="古賀 荘翠 / Sosui Koga" data-en="Sosui Koga / 古賀 荘翠">古賀 荘翠 / Sosui Koga</h1>
    <p class="subtitle" data-ja="Researcher / Creator" data-en="Researcher / Creator">Researcher / Creator</p>
  </header>

  <section class="profile-hero">
    <img class="profile-image" src="public/face2.png" alt="プロフィール画像">
    <div class="profile-summary">
      <p data-ja="奈良先端科学技術大学院大学 情報理工学領域 博士後期課程 1年" data-en="Ph.D. student (1st year), Division of Information Science, NAIST">奈良先端科学技術大学院大学 情報理工学領域 博士後期課程 1年</p>
      <p data-ja="光メディアインタフェース研究室 所属" data-en="Affiliation: Optical Media Interface Lab">光メディアインタフェース研究室 所属</p>
      <p data-ja="ANIMINS Project メンバー" data-en="Member of ANIMINS Project">ANIMINS Project メンバー</p>
    </div>
  </section>

  <!-- カード一覧を表示するコンテナ -->
  <div id="cards-container" class="cards-container"></div>

  <!-- Papa Parse を使ってCSV読み込み & カード生成 -->
  <script>
    const LANG_KEY = 'site-lang';
    let currentLang = localStorage.getItem(LANG_KEY) || 'ja';

    function applyStaticLanguage() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-ja][data-en]').forEach((el) => {
        el.textContent = currentLang === 'en' ? el.dataset.en : el.dataset.ja;
      });
      const button = document.getElementById('lang-toggle');
      if (button) button.textContent = currentLang === 'en' ? '日本語' : 'EN';
    }

    const csvFilePath = 'products_data.csv';
    const MIN_CARD_WIDTH = 280;
    const CARD_GAP = 16;

    function layoutMasonry() {
      const container = document.getElementById('cards-container');
      if (!container) return;

      const cards = Array.from(container.querySelectorAll('.card'));
      if (cards.length === 0) {
        container.style.height = '0px';
        return;
      }

      const containerWidth = container.clientWidth;
      const columnCount = Math.max(1, Math.floor((containerWidth + CARD_GAP) / (MIN_CARD_WIDTH + CARD_GAP)));
      const cardWidth = Math.floor((containerWidth - (columnCount - 1) * CARD_GAP) / columnCount);

      const heights = Array.from({ length: columnCount }, () => 0);

      cards.forEach((card, index) => {
        const col = index % columnCount;
        const x = col * (cardWidth + CARD_GAP);
        const y = heights[col];

        card.style.width = `${cardWidth}px`;
        card.style.left = `${x}px`;
        card.style.top = `${y}px`;

        heights[col] += card.offsetHeight + CARD_GAP;
      });

      container.style.height = `${Math.max(...heights) - CARD_GAP}px`;
    }

    Papa.parse(csvFilePath, {
      download: true,
      header: true,  // 1行目をヘッダとして扱う
      complete: function(results) {
        const data = (results.data || []).filter((item) => item && (item.title || item.year));
        data.sort((a, b) => {
          const ay = Number.parseInt((a.year || '').trim(), 10);
          const by = Number.parseInt((b.year || '').trim(), 10);
          const av = Number.isNaN(ay) ? -Infinity : ay;
          const bv = Number.isNaN(by) ? -Infinity : by;
          return bv - av;
        });
        console.log('CSV data:', data);

        const container = document.getElementById('cards-container');

        data.forEach(item => {
          // カード要素を作る
          const card = document.createElement('div');
          card.className = 'card';

          // 年を表示（yearフィールド）
          if (item.year && item.year.trim() !== '') {
            const year = document.createElement('div');
            year.className = 'card-year';
            year.textContent = item.year;
            card.appendChild(year);
          }

          // 画像
          if (item.imgPath && item.imgPath.trim() !== '') {
            const img = document.createElement('img');
            img.src = item.imgPath;
            img.loading = 'lazy';
            img.addEventListener('load', () => requestAnimationFrame(layoutMasonry));
            card.appendChild(img);
          }

          // タイトル
          if (item.title && item.title.trim() !== '') {
            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = item.title;
            card.appendChild(title);
          }

          // テキスト
          if (item.text && item.text.trim() !== '') {
            const text = document.createElement('div');
            text.className = 'card-text';
            text.textContent = item.text;
            card.appendChild(text);
          }

          // フッター（リンクなど）
          const footer = document.createElement('div');
          footer.className = 'card-footer';

          // GitHubリンクがあれば表示
          if (item.githubLink && item.githubLink.trim() !== '') {
            const ghLink = document.createElement('a');
            ghLink.href = item.githubLink;
            ghLink.target = '_blank';
            ghLink.textContent = 'GitHub';
            footer.appendChild(ghLink);
          }

          // 他にもリンク項目（projectLinkなど）を増やしたければここに追加
          if (item.projectLink && item.projectLink.trim() !== '') {
            const projectLink = document.createElement('a');
            projectLink.href = item.projectLink;
            projectLink.target = '_blank';
            projectLink.textContent = currentLang === 'en' ? 'Project' : 'プロジェクト';
            // リンク同士の間にスペースを入れる場合
            footer.appendChild(document.createTextNode(' '));
            footer.appendChild(projectLink);
          }

          // フッターをカードに追加（リンクが1つもなくても一応表示）
          card.appendChild(footer);

          // containerに追加
          container.appendChild(card);
        });

        requestAnimationFrame(layoutMasonry);
      }
    });

    window.addEventListener('resize', () => {
      requestAnimationFrame(layoutMasonry);
    });

    document.getElementById('lang-toggle')?.addEventListener('click', () => {
      currentLang = currentLang === 'ja' ? 'en' : 'ja';
      localStorage.setItem(LANG_KEY, currentLang);
      applyStaticLanguage();
      window.location.reload();
    });

    applyStaticLanguage();
  </script>

  <footer>
    © 2026 Sosui Koga
  </footer>
</body>
</html>
